[project]
name = "biofoundry_os"
version = "0.1.0"
description = "Operating-system abstraction layer for local and remote agent execution."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiofiles>=24.0,<26.0",
    "asyncssh==2.21.1",
]

[dependency-groups]
dev = [
    "pyright>=1.1.407",
    "ty>=0.0.7",
    "ruff>=0.14.9",
]

[build-system]
requires = ["uv_build>=0.8.5,<0.9.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "biofoundry_os"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle
    "F",   # Pyflakes
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "I",   # isort
]

[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.13"
include = [
    "src/**/*.py",
]

[tool.ty.environment]
python-version = "3.13"

[tool.ty.src]
include = [
    "src/**/*.py",
]
